name: CI

on:
  push:
  pull_request:

jobs:
  cpu-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

      - name: Run CPU fallback smoke test
        run: SMOKE_MATRIX_SIZE=128 python examples/gpu_smoke_test.py

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CUDA 13 Docker image
        run: docker build -f Dockerfile.cuda13 -t cuda13-graph-ai-fraud-detection:cuda13 .
